<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chào mừng</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{

background:#08111f;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
padding:20px;

}

.box{

width:490px;
max-width:100%;
background:#0f1d35;
padding:35px;

box-shadow:0 0 35px rgba(0,0,0,.4);

}

h1{

color:#fff;
font-size:32px;
font-weight:900;
line-height:1.3;
margin-bottom:25px;
text-shadow:2px 2px 0 rgba(255,80,80,.4);

}

.age{

display:inline-block;
padding:12px 22px;
border-radius:40px;
background:#2d2815;
border:1px solid #8b6d00;
color:#ffd84b;
font-weight:bold;
margin-bottom:30px;

}

p{

font-size:21px;
line-height:1.8;
color:#d5dceb;
margin-bottom:18px;

}

button{

width:100%;
height:72px;
border:none;
border-radius:45px;

background:linear-gradient(#4b6fff,#3558ea);

color:#fff;

font-size:38px;
font-weight:bold;

cursor:pointer;

transition:.2s;

box-shadow:0 10px 20px rgba(70,100,255,.4);

}

button:hover{

transform:translateY(-2px);

}

.loading{

margin-top:15px;
width:100%;
height:5px;
background:#24344d;
border-radius:20px;
display:none;
overflow:hidden;

}

.bar{

width:0%;
height:100%;
background:#fff;

}

.note{

margin-top:18px;
text-align:center;
font-size:16px;
color:#bcc4d3;

}

.copy{

margin-top:20px;
text-align:center;
font-size:15px;
color:#8792a8;

}

</style>

</head>

<body>

<div class="box">

<h1>
🎉 CHÀO MỪNG BẠN ĐẾN VỚI<br>
KÊNH GIẢI TRÍ BẢO STING
</h1>

<div class="age">
Chỉ dành cho người từ 18 tuổi trở lên
</div>
<button onclick="go()">

TIẾP TỤC

</button>

<div class="loading">

<div class="bar"></div>

</div>

<div class="note">

Bạn cần tích tiếp tục để vào kênh.

</div>

<div class="copy">

© 2026 Thế Giới Giải Trí

</div>

</div>

<script>

function go(){

document.querySelector("button").innerHTML="ĐANG XÁC MINH...";

document.querySelector(".loading").style.display="block";

let bar=document.querySelector(".bar");

let width=0;

let load=setInterval(function(){

width++;

bar.style.width=width+"%";

if(width>=100){

clearInterval(load);

window.location.href="https://gaviet234.com";

}

},20);

}

</script>

</body>

</html>
