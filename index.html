<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Trang giới thiệu</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      padding: 20px;
      background: #08101f;
      color: #ffffff;
      font-family: Arial, Helvetica, sans-serif;

      display: flex;
      align-items: center;
      justify-content: center;
    }

    .welcome-box {
      width: 100%;
      max-width: 490px;
      padding: 38px 34px 22px;
      background: #101d34;
      box-shadow: 0 18px 55px rgba(0, 0, 0, 0.32);
    }

    .title {
      margin: 0 0 24px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 28px;
      line-height: 1.3;
      font-weight: 900;
      text-transform: uppercase;

      text-shadow:
        1px 1px 0 rgba(255, 75, 75, 0.55),
        2px 2px 0 rgba(58, 105, 255, 0.35);
    }

    .age-label {
      display: inline-block;
      margin-bottom: 28px;
      padding: 12px 22px;

      border: 1px solid #806600;
      border-radius: 999px;

      background: #302a12;
      color: #ffd83d;

      font-size: 16px;
      line-height: 1.3;
      font-weight: 800;
      text-align: center;
    }

    .destination-box {
      margin-bottom: 26px;
      padding: 16px;

      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 10px;

      background: rgba(255, 255, 255, 0.05);
      text-align: center;
    }

    .destination-label {
      margin: 0 0 7px;
      color: #aeb9cc;
      font-size: 14px;
    }

    .destination-domain {
      margin: 0;
      color: #ffffff;
      font-size: 20px;
      font-weight: 800;
      word-break: break-word;
    }

    .continue-button {
      display: flex;
      align-items: center;
      justify-content: center;

      width: 100%;
      min-height: 70px;
      padding: 15px 22px;

      border: 0;
      border-radius: 999px;

      background: linear-gradient(
        180deg,
        #4b6fff 0%,
        #3659eb 100%
      );

      box-shadow:
        0 12px 28px rgba(58, 91, 237, 0.30),
        inset 0 1px 0 rgba(255, 255, 255, 0.18);

      color: #ffffff;
      text-decoration: none;

      font-family: Georgia, "Times New Roman", serif;
      font-size: 28px;
      font-weight: 900;
      text-transform: uppercase;

      transition:
        transform 0.18s ease,
        filter 0.18s ease;
    }

    .continue-button:hover {
      transform: translateY(-2px);
      filter: brightness(1.06);
    }

    .continue-button:active {
      transform: translateY(0);
    }

    .note {
      margin: 23px 0 20px;
      color: #b6c0d2;
      font-size: 15px;
      line-height: 1.5;
      text-align: center;
    }

    .copyright {
      margin: 0;
      color: #8f9bb0;
      font-size: 15px;
      text-align: center;
    }

    @media (max-width: 560px) {
      body {
        padding: 16px;
      }

      .welcome-box {
        padding: 30px 22px 18px;
      }

      .title {
        font-size: 22px;
      }

      .age-label {
        width: 100%;
        padding: 11px 14px;
        font-size: 14px;
      }

      .destination-domain {
        font-size: 18px;
      }

      .continue-button {
        min-height: 61px;
        font-size: 23px;
      }
    }
  </style>
</head>

<body>

  <main class="welcome-box">

    <h1 class="title">
      🎉 Bạn đang vào Kênh Bảo Sting<br>
      
    </h1>

    <div class="destination-box">
      <p class="destination-label">
        Website bạn sắp mở:
      </p>

      <p class="destination-domain">
        gaviet.top
      </p>
    </div>

    <a
      class="continue-button"
      href="https://gaviet.top"
      target="_blank"
      rel="noopener noreferrer"
    >
      TRUY CẬP TRANG
    </a>

    <p class="note">
      Website chỉ được mở khi bạn bấm nút phía trên.
    </p>
    <p class="copyright">
      © <span id="currentYear"></span> Trang Giới Thiệu
    </p>

  </main>

  <script>
    document.getElementById("currentYear").textContent =
      new Date().getFullYear();
  </script>

</body>
</html>
