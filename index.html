<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kênh giải trí</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      padding: 20px;
      background: #07101f;
      color: white;
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      width: 100%;
      max-width: 610px;
      padding: 50px 44px 38px;
      background: #101d34;
      box-shadow: 0 20px 55px rgba(0, 0, 0, 0.35);
    }

    .title {
      margin: 0 0 32px;
      font-size: 43px;
      line-height: 1.2;
      font-weight: 900;
      text-transform: uppercase;
      text-shadow:
        2px 2px 0 #d96b62,
        4px 4px 0 rgba(0, 0, 0, 0.18);
    }

    .age {
      display: inline-block;
      margin-bottom: 37px;
      padding: 13px 27px;
      border: 1px solid #957500;
      border-radius: 999px;
      background: #302b12;
      color: #ffd83d;
      font-size: 20px;
      font-weight: 800;
    }

    .button {
      width: 100%;
      min-height: 90px;
      border: 0;
      border-radius: 999px;
      background: linear-gradient(180deg, #4e70ff, #3b5eef);
      box-shadow: 0 14px 28px rgba(55, 86, 230, 0.4);
      color: white;
      font-size: 42px;
      font-weight: 900;
      cursor: pointer;
    }

    .note {
      margin: 23px 0 25px;
      color: #c8d0df;
      font-size: 18px;
      text-align: center;
    }

    .copyright {
      margin: 0;
      color: #8f9db5;
      font-size: 17px;
      text-align: center;
    }

    .loading-screen {
      display: none;
      width: 100%;
      max-width: 610px;
      min-height: 330px;
      padding: 55px 40px;
      background: #050505;
      border: 1px solid #242424;
      text-align: center;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    .loading-screen.show {
      display: flex;
    }

    .spinner {
      width: 64px;
      height: 64px;
      margin-bottom: 28px;
      border: 6px solid #444;
      border-bottom-color: #ffd400;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loading-title {
      margin: 0 0 18px;
      font-size: 27px;
      font-weight: 800;
    }

    .countdown {
      margin: 0;
      color: #c4c4c4;
      font-size: 17px;
    }

    @media (max-width: 620px) {
      .card {
        padding: 35px 24px 28px;
      }

      .title {
        font-size: 30px;
      }

      .age {
        width: 100%;
        padding: 12px 15px;
        font-size: 16px;
        text-align: center;
      }

      .button {
        min-height: 70px;
        font-size: 30px;
      }

      .loading-title {
        font-size: 22px;
      }
    }
  </style>
</head>

<body>

  <main id="welcomeCard" class="card">

    <h1 class="title">
      🎉 Bạn đang vào<br>
      kênh giải trí
    </h1>

    <div class="age">
      Chỉ dành cho người từ 18 tuổi trở lên
    </div>

    <button id="continueButton" class="button" type="button">
      TIẾP TỤC
    </button>

    <p class="note">
      Bạn cần nhấn tiếp tục để vào trang.
    </p>

    <p class="copyright">
      © <span id="year"></span> Kênh Giải Trí
    </p>

  </main>

  <section id="loadingScreen" class="loading-screen">

    <div class="spinner"></div>

    <h2 class="loading-title">
      Bạn đang được chuyển đến trang giải trí...
    </h2>

    <p id="countdown" class="countdown">
      Vui lòng đợi 2 giây...
    </p>

  </section>

    const loadingScreen =
